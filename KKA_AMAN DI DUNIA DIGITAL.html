<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Keamanan Digital - SD Negeri Sukabumi 2</title>
    <style>
        /* Reset dan Base Styles */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #00f0ff;
            --primary-glow: rgba(0, 240, 255, 0.7);
            --secondary: #9d4edd;
            --secondary-glow: rgba(157, 78, 221, 0.7);
            --dark: #0a0a1f;
            --darker: #050510;
            --light: #e0e0ff;
            --success: #00ff88;
            --warning: #ffaa00;
            --danger: #ff375f;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, var(--darker) 0%, var(--dark) 100%);
            color: var(--light);
            min-height: 100vh;
            overflow-x: hidden;
        }

        #root {
            min-height: 100vh;
        }

        /* Utility Classes */
        .hidden {
            display: none !important;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 1rem;
        }

        /* Animasi Opening */
        .opening-container {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: radial-gradient(circle at center, var(--dark) 0%, var(--darker) 100%);
            position: relative;
            overflow: hidden;
        }

        .opening-container::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: 
                linear-gradient(90deg, transparent 98%, var(--primary-glow) 100%),
                linear-gradient(0deg, transparent 98%, var(--primary-glow) 100%);
            background-size: 30px 30px;
            animation: gridMove 20s linear infinite;
            pointer-events: none;
        }

        @keyframes gridMove {
            0% { background-position: 0 0; }
            100% { background-position: 30px 30px; }
        }

        .logo-animation {
            position: relative;
            margin-bottom: 2rem;
            animation: float 3s ease-in-out infinite;
        }

        .logo-placeholder {
            width: 200px;
            height: 200px;
            background: linear-gradient(45deg, var(--primary), var(--secondary));
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--darker);
            font-weight: bold;
            font-size: 1.1rem;
            text-align: center;
            padding: 1rem;
            line-height: 1.4;
        }

        .glowing-border {
            position: absolute;
            top: -10px;
            left: -10px;
            right: -10px;
            bottom: -10px;
            border: 2px solid var(--primary);
            border-radius: 20px;
            animation: pulse 2s ease-in-out infinite;
            box-shadow: 0 0 30px var(--primary-glow);
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.7; }
            50% { opacity: 1; }
        }

        .futuristic-title {
            font-size: 3rem;
            font-weight: 700;
            background: linear-gradient(45deg, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-align: center;
            margin-bottom: 1rem;
            text-shadow: 0 0 30px var(--primary-glow);
            animation: textGlow 2s ease-in-out infinite alternate;
        }

        @keyframes textGlow {
            from { text-shadow: 0 0 20px var(--primary-glow); }
            to { text-shadow: 0 0 30px var(--secondary-glow), 0 0 40px var(--primary-glow); }
        }

        .futuristic-subtitle {
            font-size: 1.2rem;
            color: var(--light);
            margin-bottom: 3rem;
            text-align: center;
        }

        /* Tombol Futuristik */
        .futuristic-btn {
            background: linear-gradient(45deg, var(--primary), var(--secondary));
            border: none;
            padding: 12px 30px;
            font-size: 1.1rem;
            font-weight: 600;
            color: var(--darker);
            border-radius: 50px;
            cursor: pointer;
            position: relative;
            overflow: hidden;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .futuristic-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
            transition: left 0.5s ease;
        }

        .futuristic-btn:hover::before {
            left: 100%;
        }

        .futuristic-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(0, 240, 255, 0.4);
        }

        .start-btn {
            font-size: 1.3rem;
            padding: 15px 40px;
            margin-top: 2rem;
        }

        /* Navbar Futuristik */
        .navbar {
            background: rgba(10, 10, 31, 0.9);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--primary);
            box-shadow: 0 0 20px rgba(0, 240, 255, 0.3);
            padding: 1rem 2rem;
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .navbar-content {
            display: flex;
            justify-content: space-between;
            align-items: center;
            max-width: 1200px;
            margin: 0 auto;
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .user-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: linear-gradient(45deg, var(--primary), var(--secondary));
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            color: var(--darker);
        }

        .nav-menu {
            display: flex;
            gap: 2rem;
            list-style: none;
        }

        .nav-item {
            position: relative;
        }

        .nav-link {
            color: var(--light);
            text-decoration: none;
            padding: 0.5rem 1rem;
            border-radius: 25px;
            transition: all 0.3s ease;
            position: relative;
            cursor: pointer;
        }

        .nav-link:hover {
            color: var(--primary);
            background: rgba(0, 240, 255, 0.1);
        }

        .nav-link.active {
            color: var(--primary);
            background: rgba(0, 240, 255, 0.2);
            box-shadow: 0 0 15px rgba(0, 240, 255, 0.3);
        }

        /* Login Page */
        .login-container {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 2rem;
        }

        .login-card {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(0, 240, 255, 0.3);
            border-radius: 20px;
            padding: 3rem;
            backdrop-filter: blur(10px);
            max-width: 500px;
            width: 100%;
            text-align: center;
        }

        .login-card h2 {
            margin-bottom: 1rem;
            color: var(--primary);
        }

        .input-group {
            position: relative;
            margin: 2rem 0;
        }

        .futuristic-input {
            width: 100%;
            padding: 1rem;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid var(--primary);
            border-radius: 10px;
            color: white;
            font-size: 1rem;
            transition: all 0.3s ease;
        }

        .futuristic-input:focus {
            outline: none;
            box-shadow: 0 0 15px rgba(0, 240, 255, 0.5);
        }

        .login-tips {
            margin-top: 2rem;
            text-align: left;
            background: rgba(0, 240, 255, 0.1);
            padding: 1rem;
            border-radius: 10px;
            border-left: 4px solid var(--primary);
        }

        .login-tips h3 {
            color: var(--primary);
            margin-bottom: 0.5rem;
        }

        .login-tips ul {
            list-style: none;
        }

        .login-tips li {
            margin-bottom: 0.5rem;
            padding-left: 1.5rem;
            position: relative;
        }

        .login-tips li::before {
            content: '🔒';
            position: absolute;
            left: 0;
        }

        /* Home Page */
        .home-container {
            padding: 2rem;
            text-align: center;
            min-height: calc(100vh - 80px);
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .page-header {
            text-align: center;
            padding: 2rem 0;
        }

        .page-header h1 {
            font-size: 2.5rem;
            margin-bottom: 1rem;
            background: linear-gradient(45deg, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .menu-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 2rem;
            margin-top: 3rem;
            max-width: 800px;
            margin-left: auto;
            margin-right: auto;
        }

        .menu-card {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(0, 240, 255, 0.3);
            border-radius: 20px;
            padding: 2rem;
            text-decoration: none;
            color: inherit;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
            cursor: pointer;
        }

        .menu-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: linear-gradient(90deg, var(--primary), var(--secondary));
        }

        .menu-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 35px rgba(0, 240, 255, 0.2);
            border-color: var(--primary);
        }

        .menu-icon {
            font-size: 3rem;
            margin-bottom: 1rem;
        }

        /* Materials Page */
        .materials-page {
            padding: 2rem;
            min-height: calc(100vh - 80px);
        }

        .materials-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 2rem;
            max-width: 1200px;
            margin: 0 auto;
        }

        .material-card {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(0, 240, 255, 0.3);
            border-radius: 20px;
            padding: 2rem;
            backdrop-filter: blur(10px);
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .material-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: linear-gradient(90deg, var(--primary), var(--secondary));
        }

        .material-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 35px rgba(0, 240, 255, 0.2);
            border-color: var(--primary);
        }

        .material-header {
            display: flex;
            align-items: center;
            gap: 1rem;
            margin-bottom: 1.5rem;
        }

        .material-icon {
            width: 50px;
            height: 50px;
            background: linear-gradient(45deg, var(--primary), var(--secondary));
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            color: var(--darker);
        }

        .material-content {
            line-height: 1.6;
            margin-bottom: 1.5rem;
        }

        .material-content p {
            margin-bottom: 1rem;
        }

        .tips-list {
            background: rgba(0, 240, 255, 0.1);
            border-left: 4px solid var(--primary);
            padding: 1rem 1rem 1rem 2rem;
            border-radius: 0 10px 10px 0;
        }

        .tips-list h4 {
            color: var(--primary);
            margin-bottom: 0.5rem;
        }

        .tips-list ul {
            list-style: none;
        }

        .tips-list li {
            margin-bottom: 0.5rem;
            position: relative;
            padding-left: 1.5rem;
        }

        .tips-list li::before {
            content: '✓';
            position: absolute;
            left: 0;
            color: var(--success);
            font-weight: bold;
        }

        /* Quiz Page */
        .quiz-page {
            padding: 2rem;
            max-width: 1200px;
            margin: 0 auto;
            min-height: calc(100vh - 80px);
        }

        .quiz-header {
            text-align: center;
            margin-bottom: 3rem;
        }

        .level-indicator {
            display: flex;
            justify-content: center;
            gap: 1rem;
            margin: 2rem 0;
        }

        .level-dot {
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.2);
            border: 2px solid var(--primary);
            transition: all 0.3s ease;
        }

        .level-dot.active {
            background: var(--primary);
            box-shadow: 0 0 15px var(--primary-glow);
        }

        .level-dot.completed {
            background: var(--success);
            border-color: var(--success);
        }

        .score-display {
            font-size: 1.5rem;
            color: var(--primary);
            margin: 1rem 0;
            text-align: center;
        }

        .drag-drop-area {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 2rem;
            margin-top: 2rem;
        }

        .draggable-items, .drop-zones {
            display: grid;
            gap: 1rem;
        }

        .draggable-item, .drop-zone {
            padding: 1rem;
            border-radius: 10px;
            text-align: center;
            transition: all 0.3s ease;
        }

        .draggable-item {
            background: rgba(0, 240, 255, 0.1);
            border: 2px dashed var(--primary);
            cursor: grab;
        }

        .draggable-item:active {
            cursor: grabbing;
        }

        .draggable-item:hover {
            background: rgba(0, 240, 255, 0.2);
            transform: scale(1.05);
        }

        .drop-zone {
            background: rgba(157, 78, 221, 0.1);
            border: 2px solid var(--secondary);
            min-height: 80px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .drop-zone:hover {
            background: rgba(157, 78, 221, 0.2);
        }

        .drop-zone.correct {
            background: rgba(0, 255, 136, 0.2);
            border-color: var(--success);
        }

        .drop-zone.wrong {
            background: rgba(255, 55, 95, 0.2);
            border-color: var(--danger);
        }

        .completion-message {
            text-align: center;
            margin-top: 3rem;
            padding: 2rem;
            background: rgba(0, 240, 255, 0.1);
            border-radius: 20px;
            border: 1px solid var(--primary);
        }

        /* Responsive Design */
        @media (max-width: 768px) {
            .futuristic-title {
                font-size: 2rem;
            }
            
            .navbar-content {
                flex-direction: column;
                gap: 1rem;
            }
            
            .nav-menu {
                gap: 1rem;
            }
            
            .materials-grid {
                grid-template-columns: 1fr;
                padding: 1rem;
            }
            
            .drag-drop-area {
                grid-template-columns: 1fr;
            }
            
            .material-card {
                padding: 1.5rem;
            }
            
            .menu-grid {
                grid-template-columns: 1fr;
            }
            
            .login-card {
                padding: 2rem 1.5rem;
                margin: 1rem;
            }
            
            .page-header h1 {
                font-size: 2rem;
            }
        }

        /* Animasi Transisi */
        .page-enter {
            opacity: 0;
            transform: translateY(20px);
        }

        .page-enter-active {
            opacity: 1;
            transform: translateY(0);
            transition: opacity 0.3s ease, transform 0.3s ease;
        }

        .page-exit {
            opacity: 1;
        }

        .page-exit-active {
            opacity: 0;
            transform: translateY(-20px);
            transition: opacity 0.3s ease, transform 0.3s ease;
        }
    </style>
</head>

        // KOMPONEN REACT-LIKE SEDERHANA
        class App {
            constructor() {
                this.state = {
                    currentPage: 'opening',
                    userName: '',
                    isLoggedIn: false
                };
                this.root = document.getElementById('root');
                this.init();
            }

            init() {
                // Cek localStorage untuk data user
                const savedName = localStorage.getItem('digitalSafetyUserName');
                if (savedName) {
                    this.state.userName = savedName;
                    this.state.isLoggedIn = true;
                    this.state.currentPage = 'home';
                }
                this.render();
            }

            setState(newState) {
                this.state = { ...this.state, ...newState };
                this.render();
            }

            handleLogin(name) {
                this.setState({
                    userName: name,
                    isLoggedIn: true,
                    currentPage: 'home'
                });
                localStorage.setItem('digitalSafetyUserName', name);
            }

            handleLogout() {
                this.setState({
                    userName: '',
                    isLoggedIn: false,
                    currentPage: 'login'
                });
                localStorage.removeItem('digitalSafetyUserName');
            }

            navigateTo(page) {
                this.setState({ currentPage: page });
            }

            render() {
                this.root.innerHTML = '';
                
                switch(this.state.currentPage) {
                    case 'opening':
                        this.root.appendChild(this.renderOpeningAnimation());
                        break;
                    case 'login':
                        this.root.appendChild(this.renderLogin());
                        break;
                    case 'home':
                        this.root.appendChild(this.renderNavbar());
                        this.root.appendChild(this.renderHome());
                        break;
                    case 'materials':
                        this.root.appendChild(this.renderNavbar());
                        this.root.appendChild(this.renderMaterials());
                        break;
                    case 'quiz':
                        this.root.appendChild(this.renderNavbar());
                        this.root.appendChild(this.renderQuiz());
                        break;
                }
            }

            renderOpeningAnimation() {
                const container = document.createElement('div');
                container.className = 'opening-container';
                
                container.innerHTML = `
                    <div class="logo-animation">
                        <div class="logo-placeholder">
                            SD NEGERI<br>SUKABUMI 2<br>PROBOLINGGO
                        </div>
                        <div class="glowing-border"></div>
                    </div>
                    <h1 class="futuristic-title">KEAMANAN DIGITAL</h1>
                    <p class="futuristic-subtitle">Tetap Aman di Dunia Maya</p>
                    <button class="futuristic-btn start-btn" id="startBtn">
                        MULAI PETUALANGAN
                    </button>
                `;

                const startBtn = container.querySelector('#startBtn');
                startBtn.addEventListener('click', () => {
                    this.navigateTo('login');
                });

                return container;
            }

            renderLogin() {
                const container = document.createElement('div');
                container.className = 'login-container';
                
                container.innerHTML = `
                    <div class="login-card futuristic-card">
                        <h2>Masuk ke Dunia Digital</h2>
                        <p>Masukkan nama Anda untuk memulai pembelajaran</p>
                        
                        <form id="loginForm">
                            <div class="input-group">
                                <input
                                    type="text"
                                    id="nameInput"
                                    placeholder="Nama Anda"
                                    class="futuristic-input"
                                    required
                                />
                                <div class="input-glow"></div>
                            </div>
                            
                            <button type="submit" class="futuristic-btn login-btn">
                                Masuk
                            </button>
                        </form>
                        
                        <div class="login-tips">
                            <h3>Tips Keamanan:</h3>
                            <ul>
                                <li>Jangan bagikan informasi pribadi</li>
                                <li>Gunakan kata sandi yang kuat</li>
                                <li>Berhati-hati dengan orang asing</li>
                            </ul>
                        </div>
                    </div>
                `;

                const form = container.querySelector('#loginForm');
                const input = container.querySelector('#nameInput');

                form.addEventListener('submit', (e) => {
                    e.preventDefault();
                    const name = input.value.trim();
                    if (name) {
                        this.handleLogin(name);
                    }
                });

                return container;
            }

            renderNavbar() {
                const navbar = document.createElement('nav');
                navbar.className = 'navbar';
                
                navbar.innerHTML = `
                    <div class="navbar-content">
                        <div class="user-info">
                            <div class="user-avatar">
                                ${this.state.userName.charAt(0).toUpperCase()}
                            </div>
                            <span>Halo, ${this.state.userName}!</span>
                        </div>
                        
                        <ul class="nav-menu">
                            <li class="nav-item">
                                <a class="nav-link ${this.state.currentPage === 'home' ? 'active' : ''}" 
                                   data-page="home">Beranda</a>
                            </li>
                            <li class="nav-item">
                                <a class="nav-link ${this.state.currentPage === 'materials' ? 'active' : ''}" 
                                   data-page="materials">Materi</a>
                            </li>
                            <li class="nav-item">
                                <a class="nav-link ${this.state.currentPage === 'quiz' ? 'active' : ''}" 
                                   data-page="quiz">Kuis</a>
                            </li>
                            <li class="nav-item">
                                <a class="nav-link" id="logoutBtn">Keluar</a>
                            </li>
                        </ul>
                    </div>
                `;

                // Tambahkan event listeners
                const links = navbar.querySelectorAll('.nav-link[data-page]');
                links.forEach(link => {
                    link.addEventListener('click', (e) => {
                        e.preventDefault();
                        this.navigateTo(link.dataset.page);
                    });
                });

                const logoutBtn = navbar.querySelector('#logoutBtn');
                logoutBtn.addEventListener('click', (e) => {
                    e.preventDefault();
                    this.handleLogout();
                });

                return navbar;
            }

            renderHome() {
                const container = document.createElement('div');
                container.className = 'home-container';
                
                container.innerHTML = `
                    <div class="page-header">
                        <h1>Selamat Datang di Dunia Digital</h1>
                        <p>Mari belajar menjadi pengguna internet yang cerdas dan aman</p>
                    </div>
                    
                    <div class="menu-grid">
                        <div class="menu-card" data-page="materials">
                            <div class="menu-icon">📚</div>
                            <h3>Materi Pembelajaran</h3>
                            <p>Pelajari tentang keamanan informasi pribadi dan cara aman berinternet</p>
                        </div>
                        
                        <div class="menu-card" data-page="quiz">
                            <div class="menu-icon">🎮</div>
                            <h3>Kuis Interaktif</h3>
                            <p>Uji pengetahuanmu dengan game drag & drop yang menyenangkan</p>
                        </div>
                    </div>
                `;

                // Tambahkan event listeners untuk menu cards
                const menuCards = container.querySelectorAll('.menu-card');
                menuCards.forEach(card => {
                    card.addEventListener('click', () => {
                        this.navigateTo(card.dataset.page);
                    });
                });

                return container;
            }

            renderMaterials() {
                const container = document.createElement('div');
                container.className = 'materials-page';
                
                container.innerHTML = `
                    <div class="page-header">
                        <h1>Materi Keamanan Digital</h1>
                        <p>Pelajari cara tetap aman di dunia digital</p>
                    </div>
                    
                    <div class="materials-grid" id="materialsGrid">
                        ${materialsData.map((material, index) => `
                            <div class="material-card">
                                <div class="material-header">
                                    <div class="material-icon">${index + 1}</div>
                                    <h3>${material.title}</h3>
                                </div>
                                <div class="material-content">
                                    ${material.content.map(paragraph => `<p>${paragraph}</p>`).join('')}
                                </div>
                                <div class="tips-list">
                                    <h4>Tips Penting:</h4>
                                    <ul>
                                        ${material.tips.map(tip => `<li>${tip}</li>`).join('')}
                                    </ul>
                                </div>
                            </div>
                        `).join('')}
                    </div>
                `;

                return container;
            }

            renderQuiz() {
                const container = document.createElement('div');
                container.className = 'quiz-page';
                
                const quiz = new Quiz((page) => this.navigateTo(page));
                container.appendChild(quiz.render());

                return container;
            }
        }

        // KOMPONEN QUIZ
        class Quiz {
            constructor(onNavigate) {
                this.onNavigate = onNavigate;
                this.currentLevel = 1;
                this.score = 0;
                this.dragItem = null;
                this.completedLevels = [];
                this.currentGameData = gameData[1];
            }

            handleDragStart(e, item) {
                this.dragItem = item;
                e.dataTransfer.setData('text/plain', item.id);
            }

            handleDragOver(e) {
                e.preventDefault();
            }

            handleDrop(e, category) {
                e.preventDefault();
                if (this.dragItem && this.dragItem.correct === category) {
                    // Benar
                    this.score += 10;
                    this.playSound('correct');
                    
                    // Update items - hapus yang sudah benar
                    this.currentGameData.items = this.currentGameData.items.filter(item => item.id !== this.dragItem.id);
                    
                    // Update UI
                    this.updateGameUI();
                    
                    // Cek jika level selesai
                    if (this.currentGameData.items.length === 0) {
                        this.completedLevels.push(this.currentLevel);
                        if (this.currentLevel < 3) {
                            setTimeout(() => {
                                this.currentLevel++;
                                this.currentGameData = gameData[this.currentLevel];
                                this.updateGameUI();
                            }, 1500);
                        } else {
                            this.updateGameUI();
                        }
                    }
                } else {
                    // Salah
                    this.playSound('wrong');
                }
                this.dragItem = null;
            }

            playSound(type) {
                // Implementasi suara sederhana menggunakan Web Audio API
                try {
                    const audioContext = new (window.AudioContext || window.webkitAudioContext)();
                    const oscillator = audioContext.createOscillator();
                    const gainNode = audioContext.createGain();
                    
                    oscillator.connect(gainNode);
                    gainNode.connect(audioContext.destination);
                    
                    if (type === 'correct') {
                        oscillator.frequency.value = 800;
                        gainNode.gain.value = 0.1;
                    } else {
                        oscillator.frequency.value = 300;
                        gainNode.gain.value = 0.1;
                    }
                    
                    oscillator.start();
                    gainNode.gain.exponentialRampToValueAtTime(0.00001, audioContext.currentTime + 0.2);
                    oscillator.stop(audioContext.currentTime + 0.2);
                } catch (e) {
                    console.log("Audio tidak didukung di browser ini");
                }
            }

            updateGameUI() {
                const gameContainer = document.getElementById('gameContainer');
                if (gameContainer) {
                    gameContainer.innerHTML = this.renderGameContent();
                    this.attachEventListeners();
                }
            }

            resetGame() {
                this.currentLevel = 1;
                this.score = 0;
                this.completedLevels = [];
                this.currentGameData = gameData[1];
                this.updateGameUI();
            }

            attachEventListeners() {
                const draggableItems = document.querySelectorAll('.draggable-item');
                const dropZones = document.querySelectorAll('.drop-zone');

                draggableItems.forEach(item => {
                    const itemData = this.currentGameData.items.find(i => i.id === parseInt(item.dataset.id));
                    item.addEventListener('dragstart', (e) => this.handleDragStart(e, itemData));
                });

                dropZones.forEach(zone => {
                    zone.addEventListener('dragover', this.handleDragOver);
                    zone.addEventListener('drop', (e) => this.handleDrop(e, zone.dataset.category));
                });

                const resetBtn = document.getElementById('resetBtn');
                if (resetBtn) {
                    resetBtn.addEventListener('click', () => this.resetGame());
                }

                const backBtn = document.getElementById('backBtn');
                if (backBtn) {
                    backBtn.addEventListener('click', () => this.onNavigate('home'));
                }
            }

            renderGameContent() {
                return `
                    <div class="quiz-header">
                        <h1>Kuis Interaktif Keamanan Digital</h1>
                    </div>
                    
                    <div class="score-display">Skor: ${this.score}</div>
                    
                    <div class="level-indicator">
                        ${[1, 2, 3].map(level => `
                            <div class="level-dot ${level === this.currentLevel ? 'active' : ''} ${
                                this.completedLevels.includes(level) ? 'completed' : ''
                            }"></div>
                        `).join('')}
                    </div>
                    
                    <h2>Level ${this.currentLevel}: ${this.currentGameData.title}</h2>
                    <p>${this.currentGameData.description}</p>
                    
                    ${this.completedLevels.includes(3) ? `
                        <div class="completion-message">
                            <h2>Selamat! Anda menyelesaikan semua level!</h2>
                            <p>Skor akhir Anda: ${this.score}</p>
                            <button class="futuristic-btn" id="resetBtn" style="margin: 0.5rem;">
                                Main Lagi
                            </button>
                            <button class="futuristic-btn" id="backBtn" style="margin: 0.5rem;">
                                Kembali ke Menu
                            </button>
                        </div>
                    ` : `
                        <div class="drag-drop-area">
                            <div class="items-container">
                                <h3>Seret item ke kategori yang tepat:</h3>
                                <div class="draggable-items">
                                    ${this.currentGameData.items.map(item => `
                                        <div 
                                            class="draggable-item"
                                            data-id="${item.id}"
                                            draggable="true"
                                        >
                                            ${item.text}
                                        </div>
                                    `).join('')}
                                </div>
                            </div>
                            
                            <div class="categories-container">
                                <h3>Kategori:</h3>
                                <div class="drop-zones">
                                    ${this.currentGameData.categories.map(category => `
                                        <div 
                                            class="drop-zone"
                                            data-category="${category.id}"
                                        >
                                            ${category.text}
                                        </div>
                                    `).join('')}
                                </div>
                            </div>
                        </div>
                        
                        <div style="text-align: center; margin-top: 2rem;">
                            <button class="futuristic-btn" id="backBtn">
                                Kembali ke Menu
                            </button>
                        </div>
                    `}
                `;
            }

            render() {
                const container = document.createElement('div');
                container.innerHTML = `
                    <div id="gameContainer">
                        ${this.renderGameContent()}
                    </div>
                `;

                // Attach event listeners setelah render
                setTimeout(() => this.attachEventListeners(), 100);

                return container;
            }
        }

        // INISIALISASI APLIKASI
        document.addEventListener('DOMContentLoaded', () => {
            new App();
        });
    </script>
</body>
